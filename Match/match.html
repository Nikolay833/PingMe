<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PingMe — Match</title>
  <link rel="icon" type="image/png" href="../NavBar logos/ChatGPT Image Mar 27, 2026, 12_07_46 PM.png">
  <link rel="stylesheet" href="../Homepage/navbar.css">
  <link rel="stylesheet" href="match.css">
  <!-- navbar-wrap fixed positioning from head.css -->
  <style>
    .navbar-wrap {
      position: fixed;
      top: 1.5rem;
      left: 0;
      width: 100%;
      display: flex;
      justify-content: center;
      z-index: 100;
    }
  </style>
</head>
<body>

<ul class="sidebar">
  <li onclick="hideSidebar()">
    <svg xmlns="http://www.w3.org/2000/svg" height="34px" viewBox="0 -960 960 960" width="34px" fill="#000000"><path d="m256-200-56-56 224-224-224-224 56-56 224 224 224-224 56 56-224 224 224 224-56 56-224-224-224 224Z"/></svg>
  </li>
  <li><a href="../Homepage/index.html">Home</a></li>
  <li><a href="#">Match</a></li>
  <li><a href="#" onclick="goToAccount(event)">Account</a></li>
  <li><a href="../About/about.html">About</a></li>
  <li>
    <div class="space_buttons">
      <button class="btn-signin1" onclick="location.href='../Login/signin.html'">Sign In</button>
    </div>
  </li>
</ul>

<div class="page-wrapper">

  <div class="navbar-wrap">
    <header>
      <nav>
        <ul class="main-nav">
          <li><img src="../NavBar logos/ChatGPT Image Mar 27, 2026, 12_07_46 PM.png" alt="PingMe" class="nav-logo"></li>
          <li class="hideOnMobile"><a href="../Homepage/index.html">Home</a></li>
          <li class="hideOnMobile"><a href="#">Match</a></li>
          <li class="hideOnMobile"><a href="#" onclick="goToAccount(event)">Account</a></li>
          <li class="hideOnMobile"><a href="../About/about.html">About</a></li>
          <li>
            <div class="space_buttons hideOnMobile">
              <button class="btn-signin1" onclick="location.href='../Login/signin.html'">Sign In</button>
            </div>
          </li>
          <li class="menu-button" onclick="showSidebar()">
            <svg xmlns="http://www.w3.org/2000/svg" height="34px" viewBox="0 -960 960 960" width="34px" fill="#000000"><path d="M120-240v-80h720v80H120Zm0-200v-80h720v80H120Zm0-200v-80h720v80H120Z"/></svg>
          </li>
        </ul>
      </nav>
    </header>
  </div>

  <!-- Dashboard -->
  <div class="dashboard">

    <!-- Page title -->
    <div class="dash-header">
      <div>
        <h2>Your Matches</h2>
        <p class="dash-sub">People who vibe with you &mdash; start a conversation.</p>
      </div>
      <button class="btn-accent" id="find-matches-btn">
        <svg xmlns="http://www.w3.org/2000/svg" height="18px" viewBox="0 -960 960 960" width="18px" fill="#fff"><path d="M440-440H200v-80h240v-240h80v240h240v80H520v240h-80v-240Z"/></svg>
        Find New Matches
      </button>
    </div>

    <!-- Match Grid -->
    <div id="matches-grid" class="matches-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; margin-top: 1rem;">
      <!-- Match cards will be injected here -->
    </div>

    <!-- Empty state -->
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">
        <svg xmlns="http://www.w3.org/2000/svg" height="48px" viewBox="0 -960 960 960" width="48px" fill="#059669"><path d="M440-501Zm0 381L313-234q-72-65-123.5-116t-85-96q-33.5-45-49-87T40-621q0-94 63-156.5T260-840q52 0 99 22t81 62q34-40 81-62t99-22q81 0 136 45.5T831-680h-85q-18-40-53-60t-73-20q-51 0-88 27.5T463-660h-46q-31-45-70-72.5T260-760q-57 0-98.5 39.5T120-621q0 33 14 67t50 78.5q36 44.5 98 104T440-228q26-23 61-53t56-50l9 9 19.5 19.5L605-283l9 9q-22 20-56 49.5T499-172l-59 52Zm280 0v-120H600v-80h120v-120h80v120h120v80H800v120h-80Z"/></svg>
      </div>
      <h3>No matches yet</h3>
      <p>Hit the button above to start finding people to connect with.</p>
    </div>

  </div>

</div>

<script>
  function showSidebar() {
    document.querySelector('.sidebar').style.display = 'flex';
  }
  function hideSidebar() {
    document.querySelector('.sidebar').style.display = 'none';
  }
  window.addEventListener('resize', () => {
    if (window.innerWidth > 800) hideSidebar();
  });
  if (localStorage.getItem('token')) document.querySelectorAll('.btn-signin1').forEach(b => b.closest('li').style.display = 'none');
  
  function goToAccount(e) {
    e.preventDefault();
    window.location.href = localStorage.getItem('token')
      ? '../My Profile/my_profile.html'
      : '../Login/signin.html';
  }

  // Matching Logic
  const matchBtn = document.getElementById('find-matches-btn');
  const matchGrid = document.getElementById('matches-grid');
  const emptyState = document.getElementById('empty-state');

  matchBtn.addEventListener('click', async () => {
    const token = localStorage.getItem('token');
    if (!token) {
      alert('Please sign in to find matches.');
      window.location.href = '../Login/signin.html';
      return;
    }

    matchBtn.disabled = true;
    matchBtn.innerHTML = 'Finding...';

    try {
      const res = await fetch('http://localhost:3000/api/match', {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const data = await res.json();

      if (!res.ok) {
        alert(data.error || 'Failed to find matches.');
        return;
      }

      if (data.matches && data.matches.length > 0) {
        emptyState.style.display = 'none';
        matchGrid.innerHTML = '';
        
        data.matches.forEach(m => {
          const card = document.createElement('div');
          card.className = 'match-card';
          // Using style here to avoid needing separate CSS update for now, 
          // though usually better in match.css
          card.style.background = 'white';
          card.style.padding = '1.5rem';
          card.style.borderRadius = '12px';
          card.style.boxShadow = '0 4px 15px rgba(0,0,0,0.05)';
          card.style.display = 'flex';
          card.style.flexDirection = 'column';
          card.style.justifyContent = 'space-between';

          const similarityPercent = Math.round(m.similarity * 100);

          card.innerHTML = `
            <div>
              <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                <h3 style="margin:0; font-size:1.1rem; color:#2c3e50;">${m.name}</h3>
                <span style="background:#f3e8ff; color:#7c3aed; font-size:0.75rem; padding:0.25rem 0.6rem; border-radius:100px; font-weight:600;">${similarityPercent}% Match</span>
              </div>
              <p style="color:#64748b; font-size:0.85rem; margin-top:0.8rem; line-height:1.5;">${m.summary || 'No summary available.'}</p>
            </div>
            <button style="margin-top:1.5rem; background:#7c3aed; color:white; border:none; padding:0.6rem; border-radius:6px; font-weight:500; cursor:pointer; width:100%;">Connect</button>
          `;
          matchGrid.appendChild(card);
        });
      } else {
        emptyState.style.display = 'block';
        matchGrid.innerHTML = '';
        alert('No matches found based on your bio. Try expanding your description!');
      }
    } catch (err) {
      console.error('Match failed:', err);
      alert('Could not reach the server.');
    } finally {
      matchBtn.disabled = false;
      matchBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" height="18px" viewBox="0 -960 960 960" width="18px" fill="#fff"><path d="M440-440H200v-80h240v-240h80v240h240v80H520v240h-80v-240Z"/></svg> Find New Matches';
    }
  });
</script>

</body>
</html>
