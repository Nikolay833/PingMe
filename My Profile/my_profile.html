<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PingMe — My Profile</title>
  <link rel="stylesheet" href="my_profile.css" />
</head>
<body>

  <div class="card">

    <div class="logo">
      <img src="../NavBar logos/ChatGPT Image Mar 26, 2026, 11_38_51 PM.png" alt="PingMe" class="card-logo">
    </div>

    <!-- Avatar -->
    <div class="avatar-wrap">
      <div class="avatar" title="Change photo">
        <!-- Default person icon -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
             stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="8" r="4"/>
          <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
        <!-- Populated when user picks a file -->
        <img id="avatar-img" alt="Profile photo" />
      </div>
      <span class="avatar-hint">Change photo</span>
      <input id="avatar-input" type="file" accept="image/*" style="display:none" />
    </div>

    <p class="profile-name">Your Name</p>
    <p class="profile-handle">@yourhandle</p>

    <form>
      <div class="field">
        <label for="display-name">Display name</label>
        <input id="display-name" type="text" placeholder="Your Name" autocomplete="name" />
      </div>

      <div class="field">
        <label for="bio">Bio</label>
        <textarea id="bio" placeholder="Tell people a little about yourself…"></textarea>
      </div>

      <div class="field">
        <label for="location">Location</label>
        <input id="location" type="text" placeholder="Sofia, Bulgaria" />
      </div>

      <button type="submit">Save changes</button>
    </form>

  </div>

  <script>
    const API = 'http://localhost:3000';
    const token = localStorage.getItem('token');

    if (!token) {
      window.location.href = '../Login/login.html';
    }

    function authHeaders() {
      return { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };
    }

    // Load profile on page open
    async function loadProfile() {
      try {
        const res  = await fetch(`${API}/api/profile`, { headers: authHeaders() });
        const data = await res.json();

        document.querySelector('.profile-name').textContent    = data.name || 'Your Name';
        document.querySelector('.profile-handle').textContent  = '@' + (data.name || 'yourhandle').toLowerCase().replace(/\s+/g, '');
        document.getElementById('display-name').value = data.name     || '';
        document.getElementById('bio').value          = data.bio      || '';
        document.getElementById('location').value     = data.location || '';

        if (data.avatar_url) {
          avatarImg.src = data.avatar_url;
          avatarImg.style.display = 'block';
          avatarWrap.querySelector('svg').style.display = 'none';
        }
      } catch (err) {
        console.error('Failed to load profile:', err);
      }
    }

    // Save changes
    document.querySelector('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      btn.textContent = 'Saving...';
      btn.disabled = true;

      try {
        await fetch(`${API}/api/profile`, {
          method: 'PATCH',
          headers: authHeaders(),
          body: JSON.stringify({
            name:     document.getElementById('display-name').value,
            bio:      document.getElementById('bio').value,
            location: document.getElementById('location').value,
          })
        });
        btn.textContent = 'Saved!';
        setTimeout(() => { btn.textContent = 'Save changes'; btn.disabled = false; }, 2000);
      } catch (err) {
        btn.textContent = 'Save changes';
        btn.disabled = false;
        alert('Failed to save: ' + err.message);
      }
    });

    // Avatar upload
    const avatarWrap  = document.querySelector('.avatar');
    const avatarInput = document.getElementById('avatar-input');
    const avatarImg   = document.getElementById('avatar-img');

    avatarWrap.addEventListener('click', () => avatarInput.click());

    avatarInput.addEventListener('change', async () => {
      const file = avatarInput.files[0];
      if (!file) return;

      // Show preview immediately
      avatarImg.src = URL.createObjectURL(file);
      avatarImg.style.display = 'block';
      avatarWrap.querySelector('svg').style.display = 'none';

      // Upload to server
      try {
        const formData = new FormData();
        formData.append('photo', file);

        const res  = await fetch(`${API}/api/upload`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${token}` },
          body: formData
        });
        const data = await res.json();

        // Save URL to profile
        await fetch(`${API}/api/profile/avatar`, {
          method: 'PATCH',
          headers: authHeaders(),
          body: JSON.stringify({ avatar_url: data.url })
        });
      } catch (err) {
        console.error('Avatar upload failed:', err);
      }
    });

    loadProfile();
  </script>

</body>
</html>
