<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PingMe — My Profile</title>
  <link rel="icon" type="image/png" href="../NavBar logos/ChatGPT Image Mar 27, 2026, 12_07_46 PM.png">
  <link rel="stylesheet" href="my_profile.css" />
  <link rel="stylesheet" href="../Homepage/navbar.css" />
  <style>
    .navbar-wrap { position: fixed; top: 1.5rem; left: 0; width: 100%; display: flex; justify-content: center; z-index: 100; }
    body { padding-top: 6rem; align-items: flex-start; overflow-y: auto; }
  </style>
</head>
<body>

<ul class="sidebar">
  <li onclick="hideSidebar()">
    <svg xmlns="http://www.w3.org/2000/svg" height="34px" viewBox="0 -960 960 960" width="34px" fill="#000000"><path d="m256-200-56-56 224-224-224-224 56-56 224 224 224-224 56 56-224 224 224 224-56 56-224-224-224 224Z"/></svg>
  </li>
  <li><a href="../Homepage/index.html">Home</a></li>
  <li><a href="#" onclick="goToMatch(event)">Match</a></li>
  <li><a href="#" onclick="goToAccount(event)">Account</a></li>
  <li><a href="../About/about.html">About</a></li>
  <li>
    <div class="space_buttons">
      <button class="btn-signin1" onclick="location.href='../Login/signin.html'">Sign In</button>
    </div>
  </li>
</ul>

<div class="navbar-wrap">
  <header>
    <nav>
      <ul class="main-nav">
        <li><img src="../NavBar logos/ChatGPT Image Mar 27, 2026, 12_07_46 PM.png" alt="PingMe" class="nav-logo"></li>
        <li class="hideOnMobile"><a href="../Homepage/index.html">Home</a></li>
        <li class="hideOnMobile"><a href="#" onclick="goToMatch(event)">Match</a></li>
        <li class="hideOnMobile"><a href="#" onclick="goToAccount(event)">Account</a></li>
        <li class="hideOnMobile"><a href="../About/about.html">About</a></li>
        <li>
          <div class="space_buttons hideOnMobile">
            <button class="btn-signin1" onclick="location.href='../Login/signin.html'">Sign In</button>
          </div>
        </li>
        <li class="menu-button" onclick="showSidebar()">
          <svg xmlns="http://www.w3.org/2000/svg" height="34px" viewBox="0 -960 960 960" width="34px" fill="#000000"><path d="M120-240v-80h720v80H120Zm0-200v-80h720v80H120Zm0-200v-80h720v80H120Z"/></svg>
        </li>
      </ul>
    </nav>
  </header>
</div>

  <div class="card">

    <div class="logo">
      <img src="../NavBar logos/ChatGPT Image Mar 27, 2026, 12_07_46 PM.png" alt="PingMe" class="card-logo">
    </div>

    <!-- Avatar -->
    <div class="avatar-wrap">
      <div class="avatar" title="Change photo">
        <!-- Default person icon -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
             stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="8" r="4"/>
          <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
        <!-- Populated when user picks a file -->
        <img id="avatar-img" alt="Profile photo" />
      </div>
      <span class="avatar-hint">Change photo</span>
      <input id="avatar-input" type="file" accept="image/*" style="display:none" />
    </div>

    <p class="profile-name">Your Name</p>
    <p class="profile-handle">@yourhandle</p>

    <div class="profile-info-row" id="profile-email-row" style="display:none">
      <span class="profile-info-label">✉️ Email</span>
      <span class="profile-info-value" id="profile-email"></span>
    </div>
    <div class="profile-info-row" id="profile-phone-row" style="display:none">
      <span class="profile-info-label">📞 Phone</span>
      <span class="profile-info-value" id="profile-phone"></span>
    </div>

    <form>
      <div class="field">
        <label for="display-name">Display name</label>
        <input id="display-name" type="text" placeholder="Your Name" autocomplete="name" />
      </div>

      <div class="field">
        <label for="bio">Bio</label>
        <textarea id="bio" placeholder="Tell people a little about yourself…"></textarea>
      </div>

      <div class="field">
        <label for="location">Location</label>
        <input id="location" type="text" placeholder="Sofia, Bulgaria" />
      </div>

      <button type="submit">Save changes</button>
    </form>

    <div class="logout-section">
      <button type="button" class="btn-logout" onclick="logout()">Log out</button>
    </div>

  </div>

  <!-- Notifications -->
  <div class="notif-panel" id="notif-panel" style="display:none">
    <h3 class="notif-title">🔔 Connection Requests</h3>
    <div id="notif-list"></div>
  </div>

  <!-- Connections -->
  <div class="notif-panel" id="conn-panel" style="display:none">
    <h3 class="notif-title">🤝 Connections</h3>
    <div id="conn-list"></div>
  </div>

  <script>
    const API = 'http://localhost:3000';
    const token = localStorage.getItem('token');

    if (!token) {
      window.location.href = '../Login/signin.html';
    }

    function authHeaders() {
      return { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };
    }

    // Load profile on page open
    async function loadProfile() {
      try {
        const res  = await fetch(`${API}/api/profile`, { headers: authHeaders() });
        const data = await res.json();

        document.querySelector('.profile-name').textContent   = data.name || 'Your Name';
        document.querySelector('.profile-handle').textContent = '@' + (data.name || 'yourhandle').toLowerCase().replace(/\s+/g, '');
        document.getElementById('display-name').value = data.name     || '';
        document.getElementById('bio').value          = data.bio      || '';
        document.getElementById('location').value     = data.location || '';

        if (data.email) {
          document.getElementById('profile-email').textContent = data.email;
          document.getElementById('profile-email-row').style.display = 'flex';
        }
        if (data.phone) {
          document.getElementById('profile-phone').textContent = data.phone;
          document.getElementById('profile-phone-row').style.display = 'flex';
        }

        if (data.avatar_url) {
          avatarImg.src = data.avatar_url;
          avatarImg.style.display = 'block';
          avatarWrap.querySelector('svg').style.display = 'none';
        }
      } catch (err) {
        console.error('Failed to load profile:', err);
      }
    }

    // Save changes
    document.querySelector('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      btn.textContent = 'Saving...';
      btn.disabled = true;

      try {
        await fetch(`${API}/api/profile`, {
          method: 'PATCH',
          headers: authHeaders(),
          body: JSON.stringify({
            name:     document.getElementById('display-name').value,
            bio:      document.getElementById('bio').value,
            location: document.getElementById('location').value,
          })
        });
        btn.textContent = 'Saved!';
        setTimeout(() => { btn.textContent = 'Save changes'; btn.disabled = false; }, 2000);
      } catch (err) {
        btn.textContent = 'Save changes';
        btn.disabled = false;
        alert('Failed to save: ' + err.message);
      }
    });

    // Avatar upload
    const avatarWrap  = document.querySelector('.avatar');
    const avatarInput = document.getElementById('avatar-input');
    const avatarImg   = document.getElementById('avatar-img');

    avatarWrap.addEventListener('click', () => avatarInput.click());

    avatarInput.addEventListener('change', async () => {
      const file = avatarInput.files[0];
      if (!file) return;

      // Show preview immediately
      avatarImg.src = URL.createObjectURL(file);
      avatarImg.style.display = 'block';
      avatarWrap.querySelector('svg').style.display = 'none';

      // Upload to server
      try {
        const formData = new FormData();
        formData.append('photo', file);

        const res  = await fetch(`${API}/api/upload`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${token}` },
          body: formData
        });
        const data = await res.json();

        // Save URL to profile
        await fetch(`${API}/api/profile/avatar`, {
          method: 'PATCH',
          headers: authHeaders(),
          body: JSON.stringify({ avatar_url: data.url })
        });
      } catch (err) {
        console.error('Avatar upload failed:', err);
      }
    });

    loadProfile();

    async function loadNotifications() {
      try {
        const res = await fetch(`${API}/api/notifications/all`, { headers: authHeaders() });
        const data = await res.json();
        if (!Array.isArray(data) || data.length === 0) return;

        const panel = document.getElementById('notif-panel');
        const list  = document.getElementById('notif-list');
        panel.style.display = 'block';
        list.innerHTML = '';

        data.forEach(n => {
          const item = document.createElement('div');
          item.className = 'notif-item';
          item.id = `notif-${n.id}`;

          if (n.type === 'received') {
            if (n.status === 'pending') {
              item.innerHTML = `
                <p class="notif-msg"><strong>${n.sender_name}</strong> wants to connect with you</p>
                <div class="notif-actions">
                  <button class="notif-btn notif-accept" onclick="respondNotif('${n.id}','accepted',this)">Accept</button>
                  <button class="notif-btn notif-decline" onclick="respondNotif('${n.id}','declined',this)">Decline</button>
                  <button class="notif-btn notif-view" onclick="location.href='../Profile/profile.html?user_id=${n.sender_id}'">View Profile</button>
                </div>
              `;
            } else {
              const statusLabel = n.status === 'accepted' ? 'accepted' : 'declined';
              const statusColor = n.status === 'accepted' ? '#059669' : '#e53e3e';
              item.innerHTML = `
                <p class="notif-msg">You have <span style="color:${statusColor};font-weight:600;">${statusLabel}</span> the request from <strong>${n.sender_name}</strong></p>
                <div class="notif-actions">
                  <button class="notif-btn notif-view" onclick="location.href='../Profile/profile.html?user_id=${n.sender_id}'">View Profile</button>
                </div>
              `;
            }
          } else if (n.type === 'sent') {
            const statusLabel = n.status === 'pending' ? 'Pending' : (n.status === 'accepted' ? 'the request has been accepted' : 'the request has been declined');
            const statusIcon = { pending: '⏳ ', accepted: '✓ ', declined: '✗ ' }[n.status] || '';
            const statusColor = { pending: '#888', accepted: '#059669', declined: '#e53e3e' }[n.status] || '#888';
            item.innerHTML = `
              <p class="notif-msg">You sent a request to <strong>${n.recipient_name}</strong> — <span style="color:${statusColor};font-weight:600;">${statusIcon}${statusLabel}</span></p>
            `;
          }

          if (item.innerHTML) list.appendChild(item);
        });
      } catch (err) {
        console.error('Failed to load notifications:', err);
      }
    }

    async function respondNotif(id, status, btn) {
      try {
        await fetch(`${API}/api/notifications/${id}`, {
          method: 'PATCH',
          headers: authHeaders(),
          body: JSON.stringify({ status })
        });
        loadNotifications();
        if (status === 'accepted') loadConnections();
      } catch (err) {
        console.error('Failed to respond:', err);
      }
    }

    async function loadConnections() {
      try {
        const res = await fetch(`${API}/api/notifications/connections`, { headers: authHeaders() });
        const data = await res.json();
        if (!Array.isArray(data) || data.length === 0) return;

        const panel = document.getElementById('conn-panel');
        const list  = document.getElementById('conn-list');
        panel.style.display = 'block';
        list.innerHTML = '';

        data.forEach(c => {
          const item = document.createElement('div');
          item.className = 'notif-item';
          item.innerHTML = `
            <p class="notif-msg"><strong>${c.name}</strong></p>
            <div class="notif-actions">
              <button class="notif-btn notif-view" onclick="location.href='../Profile/profile.html?user_id=${c.user_id}'">View Profile</button>
            </div>
          `;
          list.appendChild(item);
        });
      } catch (err) {
        console.error('Failed to load connections:', err);
      }
    }

    loadNotifications();
    loadConnections();

    function logout() {
      localStorage.removeItem('token');
      window.location.href = '../Homepage/index.html';
    }
  </script>

  <script>
    function showSidebar() { document.querySelector('.sidebar').style.display = 'flex'; }
    function hideSidebar() { document.querySelector('.sidebar').style.display = 'none'; }
    window.addEventListener('resize', () => { if (window.innerWidth > 800) hideSidebar(); });
    if (localStorage.getItem('token')) document.querySelectorAll('.btn-signin1').forEach(b => b.closest('li').style.display = 'none');
    function goToAccount(e) {
      e.preventDefault();
      window.location.href = localStorage.getItem('token')
        ? '../My Profile/my_profile.html'
        : '../Login/signin.html';
    }
    function goToMatch(e) {
      e.preventDefault();
      window.location.href = localStorage.getItem('token')
        ? '../Match/match.html'
        : '../Login/signin.html';
    }
  </script>

</body>
</html>
