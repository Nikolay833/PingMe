<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PingMe — Sign In</title>
  <link rel="icon" type="image/png" href="../NavBar logos/ChatGPT Image Mar 26, 2026, 11_38_51 PM.png">
  <link rel="stylesheet" href="login.css" />
  <link rel="stylesheet" href="../Homepage/navbar.css" />
  <style>
    .navbar-wrap { position: fixed; top: 1.5rem; left: 0; width: 100%; display: flex; justify-content: center; z-index: 100; }
    body { padding-top: 6rem; align-items: flex-start; overflow-y: auto; }
  </style>
</head>
<body>

<ul class="sidebar">
  <li onclick="hideSidebar()">
    <svg xmlns="http://www.w3.org/2000/svg" height="34px" viewBox="0 -960 960 960" width="34px" fill="#000000"><path d="m256-200-56-56 224-224-224-224 56-56 224 224 224-224 56 56-224 224 224 224-56 56-224-224-224 224Z"/></svg>
  </li>
  <li><a href="../Homepage/index.html">Home</a></li>
  <li><a href="#">About</a></li>
  <li><a href="#">Contact</a></li>
  <li><a href="#" onclick="goToAccount(event)">Account</a></li>
  <li>
    <div class="space_buttons">
      <button class="btn-signin1" onclick="location.href='login.html'">Register</button>
    </div>
  </li>
</ul>

<div class="navbar-wrap">
  <header>
    <nav>
      <ul class="main-nav">
        <li><h1>PingMe</h1></li>
        <li class="hideOnMobile"><a href="../Homepage/index.html">Home</a></li>
        <li class="hideOnMobile"><a href="#">About</a></li>
        <li class="hideOnMobile"><a href="#">Contact</a></li>
        <li class="hideOnMobile"><a href="#" onclick="goToAccount(event)">Account</a></li>
        <li>
          <div class="space_buttons hideOnMobile">
            <button class="btn-signin1" onclick="location.href='login.html'">Register</button>
          </div>
        </li>
        <li class="menu-button" onclick="showSidebar()">
          <svg xmlns="http://www.w3.org/2000/svg" height="34px" viewBox="0 -960 960 960" width="34px" fill="#000000"><path d="M120-240v-80h720v80H120Zm0-200v-80h720v80H120Zm0-200v-80h720v80H120Z"/></svg>
        </li>
      </ul>
    </nav>
  </header>
</div>

  <div class="card">
    <div class="logo">
      <div class="logo-dot"></div>
      <span class="logo-text">PingMe</span>
    </div>

    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to your account.</p>

    <p id="form-error"   style="color:#c0392b;font-size:0.82rem;margin-bottom:0.75rem;display:none;"></p>
    <p id="form-success" style="color:#27ae60;font-size:0.82rem;margin-bottom:0.75rem;display:none;"></p>

    <form id="signin-form">
      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="alex@example.com" autocomplete="email" required />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" required />
      </div>

      <button type="submit">Sign in</button>
    </form>

    <p class="signin-link">Don't have an account? <a href="login.html">Create one</a></p>
  </div>

  <script>
    const form    = document.getElementById('signin-form');
    const errorEl = document.getElementById('form-error');
    const successEl = document.getElementById('form-success');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.style.display   = 'none';
      successEl.style.display = 'none';

      try {
        const res  = await fetch('http://localhost:3000/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email:    document.getElementById('email').value,
            password: document.getElementById('password').value,
          }),
        });

        const data = await res.json();

        if (!res.ok) {
          errorEl.textContent   = data.error;
          errorEl.style.display = 'block';
        } else {
          localStorage.setItem('token',     data.token);
          localStorage.setItem('user_id',   data.user.id);
          localStorage.setItem('user_name', data.user.name);
          localStorage.setItem('user_role', data.user.role);

          successEl.textContent   = 'Signed in! Redirecting...';
          successEl.style.display = 'block';
          setTimeout(() => window.location.href = '../My Profile/my_profile.html', 1000);
        }
      } catch {
        errorEl.textContent   = 'Could not reach the server. Make sure it is running.';
        errorEl.style.display = 'block';
      }
    });
  </script>

  <script>
    function showSidebar() { document.querySelector('.sidebar').style.display = 'flex'; }
    function hideSidebar() { document.querySelector('.sidebar').style.display = 'none'; }
    window.addEventListener('resize', () => { if (window.innerWidth > 800) hideSidebar(); });
    function goToAccount(e) {
      e.preventDefault();
      const dest = localStorage.getItem('token')
        ? '../My Profile/my_profile.html'
        : '../Login/signin.html';
      window.location.href = dest;
    }
  </script>

</body>
</html>
