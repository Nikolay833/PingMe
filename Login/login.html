<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PingMe — Create Account</title>
  <link rel="stylesheet" href="login.css" />
</head>
<body>

  <div class="card">
    <div class="logo">
      <div class="logo-dot"></div>
      <span class="logo-text">PingMe</span>
    </div>

    <h1>Create account</h1>
    <p class="subtitle">Fill in your details to get started.</p>

    <p id="form-error" style="color:#c0392b;font-size:0.82rem;margin-bottom:0.75rem;display:none;"></p>
    <p id="form-success" style="color:#27ae60;font-size:0.82rem;margin-bottom:0.75rem;display:none;"></p>

    <form id="signup-form">
      <div class="row">
        <div class="field">
          <label for="first-name">First name</label>
          <input id="first-name" type="text" placeholder="Alex" autocomplete="given-name" required />
        </div>
        <div class="field">
          <label for="surname">Surname</label>
          <input id="surname" type="text" placeholder="Johnson" autocomplete="family-name" required />
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="alex@example.com" autocomplete="email" required />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="••••••••" autocomplete="new-password" required />
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label for="country">Country</label>
          <select id="country">
            <option value="" disabled selected>Select</option>
            <option>Bulgaria</option>
            <option>United States</option>
            <option>United Kingdom</option>
            <option>Germany</option>
            <option>France</option>
            <option>Other</option>
          </select>
        </div>
        <div class="field">
          <label for="city">City</label>
          <input id="city" type="text" placeholder="Sofia" autocomplete="address-level2" />
        </div>
      </div>

      <div class="field">
        <label for="phone">Phone number</label>
        <div class="phone-wrap">
          <select id="phone-code" class="phone-code">
            <option>+359</option>
            <option>+1</option>
            <option>+44</option>
            <option>+49</option>
            <option>+33</option>
          </select>
          <input id="phone" type="tel" placeholder="88 888 8888" autocomplete="tel" />
        </div>
      </div>

      <button type="submit">Create account</button>
    </form>

    <p class="signin-link">Already have an account? <a href="signin.html">Sign in</a></p>
  </div>

  <script>
    const form = document.getElementById('signup-form');
    const errorEl = document.getElementById('form-error');
    const successEl = document.getElementById('form-success');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.style.display = 'none';
      successEl.style.display = 'none';

      const phone = document.getElementById('phone-code').value
                  + document.getElementById('phone').value;

      const payload = {
        firstName: document.getElementById('first-name').value,
        surname:   document.getElementById('surname').value,
        email:     document.getElementById('email').value,
        password:  document.getElementById('password').value,
        country:   document.getElementById('country').value,
        city:      document.getElementById('city').value,
        phone,
      };

      try {
        const res = await fetch('http://localhost:3000/api/auth/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });

        const data = await res.json();

        if (!res.ok) {
          errorEl.textContent = data.error;
          errorEl.style.display = 'block';
        } else {
          localStorage.setItem('token',     data.token);
          localStorage.setItem('user_id',   data.user.id);
          localStorage.setItem('user_name', data.user.name);
          successEl.textContent = 'Account created! Redirecting...';
          successEl.style.display = 'block';
          setTimeout(() => window.location.href = '../My Profile/my_profile.html', 1500);
        }
      } catch {
        errorEl.textContent = 'Could not reach the server. Make sure it is running.';
        errorEl.style.display = 'block';
      }
    });
  </script>

</body>
</html>
