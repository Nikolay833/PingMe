<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PingMe — Create Account</title>
  <link rel="stylesheet" href="login.css" />
</head>
<body>

  <div class="card">
    <div class="logo">
      <div class="logo-dot"></div>
      <span class="logo-text">PingMe</span>
    </div>

    <h1>Create account</h1>
    <p class="subtitle">Fill in your details to get started.</p>

    <form action="my_profile.html">
      <div class="row">
        <div class="field">
          <label for="first-name">First name</label>
          <input id="first-name" type="text" placeholder="Alex" autocomplete="given-name" />
        </div>
        <div class="field">
          <label for="surname">Surname</label>
          <input id="surname" type="text" placeholder="Johnson" autocomplete="family-name" />
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="alex@example.com" autocomplete="email" />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="••••••••" autocomplete="new-password" />
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label for="country">Country</label>
          <select id="country">
            <option value="" disabled selected>Select</option>
            <option>Bulgaria</option>
            <option>United States</option>
            <option>United Kingdom</option>
            <option>Germany</option>
            <option>France</option>
            <option>Other</option>
          </select>
        </div>
        <div class="field">
          <label for="city">City</label>
          <input id="city" type="text" placeholder="Sofia" autocomplete="address-level2" />
        </div>
      </div>

      <div class="field">
        <label for="phone">Phone number</label>
        <div class="phone-wrap">
          <select class="phone-code">
            <option>+359</option>
            <option>+1</option>
            <option>+44</option>
            <option>+49</option>
            <option>+33</option>
          </select>
          <input id="phone" type="tel" placeholder="88 888 8888" autocomplete="tel" />
        </div>
      </div>
      <button type="submit">Create account</button>
    </form>

    <p class="signin-link">Already have an account? <a href="#">Sign in</a></p>
  </div>

</body>
</html>
